<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울시 학교 체육관 사용료 산정기 - 대시보드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-mode">
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container-fluid">
        <header class="app-header compact">
            <div class="logo">
                <i class="fas fa-school"></i>
                <h1>서울시 학교 체육관 <span>사용료 산정기</span></h1>
            </div>
            <div class="header-actions">
                <button id="theme-toggle" class="btn-icon" title="테마 변경"><i class="fas fa-moon"></i></button>
                <button id="btn-settings" class="btn-icon" title="단가 설정"><i class="fas fa-cog"></i></button>
                <button id="btn-print" class="btn-icon" title="출력"><i class="fas fa-print"></i></button>
            </div>
        </header>

        <div class="dashboard-grid">
            <!-- Col 1: Base Usage -->
            <section class="card">
                <div class="card-header">
                    <i class="fas fa-calendar-alt"></i>
                    <h2>기본 사용 정보</h2>
                </div>
                <div class="card-body">
                    <div class="mode-toggle mini">
                        <button id="mode-short" class="btn-mode active">단기</button>
                        <button id="mode-long" class="btn-mode">장기</button>
                    </div>

                    <div class="input-group">
                        <label id="date-label">대관 기간</label>
                        <div class="date-range-grid">
                            <input type="date" id="start-date">
                            <span class="sep">~</span>
                            <input type="date" id="end-date">
                        </div>
                    </div>

                    <div id="weekday-selection-container" class="hidden">
                        <label>사용 요일</label>
                        <div class="weekday-picker compact">
                            <label class="day-check"><input type="checkbox" value="1"><span>월</span></label>
                            <label class="day-check"><input type="checkbox" value="2"><span>화</span></label>
                            <label class="day-check"><input type="checkbox" value="3"><span>수</span></label>
                            <label class="day-check"><input type="checkbox" value="4"><span>목</span></label>
                            <label class="day-check"><input type="checkbox" value="5"><span>금</span></label>
                            <label class="day-check"><input type="checkbox" value="6"><span>토</span></label>
                            <label class="day-check"><input type="checkbox" value="0"><span>일</span></label>
                        </div>
                    </div>

                    <div class="holiday-toggle mini">
                        <label class="checkbox-container">
                            <input type="checkbox" id="exclude-holidays">
                            <span class="checkmark"></span>
                            <span class="label-text">공휴일 자동 제외</span>
                        </label>
                    </div>

                    <div class="input-group">
                        <label>추가 제외 일자 / 가감 일수 (+/-)</label>
                        <div class="adj-grid">
                            <input type="text" id="base-exclude-dates" placeholder="제외 날짜 (쉼표 구분)">
                            <input type="number" id="base-adj-days" value="0" step="1">
                        </div>
                    </div>

                    <div class="input-group">
                        <label>체육관 규모</label>
                        <select id="gym-size">
                            <option value="small">360㎡ 미만</option>
                            <option value="medium" selected>360㎡ 이상 ~ 720㎡ 미만</option>
                            <option value="large">720㎡ 이상</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>1회 사용 시간: <span id="duration-val">2시간</span></label>
                        <input type="range" id="duration" min="1" max="12" step="1" value="2">
                    </div>

                    <div class="input-group">
                        <label for="category">감면 대상 선택 (할인율)</label>
                        <select id="category">
                            <option value="none">일반 (감면 없음 - 0%)</option>
                            <option value="resident-long">지역 주민 (6개월+ - 60%)</option>
                            <option value="vulnerable">사회적 배려 대상 (50%)</option>
                            <option value="worker-long">지역 직장인 (6개월+ - 40%)</option>
                            <option value="official">공식 행사 (100%)</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- Col 2: Facilities -->
            <section class="card">
                <div class="card-header">
                    <i class="fas fa-tools"></i>
                    <h2>시설 및 부가 옵션</h2>
                </div>
                <div class="card-body">
                    <div class="hvac-box">
                        <div class="facility-item">
                            <label class="checkbox-container main-toggle">
                                <input type="checkbox" id="use-lighting">
                                <span class="checkmark"></span>
                                <span class="label-text">조명 시설 사용</span>
                            </label>
                        </div>
                        <div id="lighting-details" class="hvac-details-panel hidden">
                            <div class="panel-row">
                                <input type="date" id="light-start">
                                <span>~</span>
                                <input type="date" id="light-end">
                            </div>
                            <div class="panel-row">
                                <span>회당</span>
                                <input type="number" id="light-hours" value="2" min="1" max="12">
                                <span>시간</span>
                            </div>
                            <div class="panel-row full">
                                <div class="adj-grid">
                                    <input type="text" id="light-exclude-dates" placeholder="조명 제외 날짜">
                                    <input type="number" id="light-adj-days" value="0" step="1">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="hvac-box">
                        <div class="facility-item">
                            <label class="checkbox-container main-toggle">
                                <input type="checkbox" id="use-cooling">
                                <span class="checkmark"></span>
                                <span class="label-text">냉방기 사용</span>
                            </label>
                        </div>
                        <div id="cooling-details" class="hvac-details-panel hidden">
                            <div class="panel-row">
                                <input type="date" id="cooling-start">
                                <span>~</span>
                                <input type="date" id="cooling-end">
                            </div>
                            <div class="panel-row">
                                <span>회당</span>
                                <input type="number" id="cooling-hours" value="2" min="1" max="12">
                                <span>시간</span>
                            </div>
                            <div class="panel-row full">
                                <div class="adj-grid">
                                    <input type="text" id="cooling-exclude-dates" placeholder="냉방 제외 날짜">
                                    <input type="number" id="cooling-adj-days" value="0" step="1">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="hvac-box">
                        <div class="facility-item">
                            <label class="checkbox-container main-toggle">
                                <input type="checkbox" id="use-heating">
                                <span class="checkmark"></span>
                                <span class="label-text">난방기 사용</span>
                            </label>
                        </div>
                        <div id="heating-details" class="hvac-details-panel hidden">
                            <div class="panel-row">
                                <input type="date" id="heating-start">
                                <span>~</span>
                                <input type="date" id="heating-end">
                            </div>
                            <div class="panel-row">
                                <span>회당</span>
                                <input type="number" id="heating-hours" value="2" min="1" max="12">
                                <span>시간</span>
                            </div>
                            <div class="panel-row full">
                                <div class="adj-grid">
                                    <input type="text" id="heating-exclude-dates" placeholder="난방 제외 날짜">
                                    <input type="number" id="heating-adj-days" value="0" step="1">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Col 3: Results -->
            <section class="card result-card">
                <div class="card-header">
                    <i class="fas fa-file-invoice-dollar"></i>
                    <h2>산정 결과 요약</h2>
                </div>
                <div class="card-body">
                    <div class="summary-box">
                        <div class="summary-item">
                            <span class="label">총 사용 횟수</span>
                            <span class="value" id="res-session-count">0회</span>
                        </div>
                        <div class="summary-item">
                            <span class="label">총 사용 시간</span>
                            <span class="value" id="res-total-hours">0시간</span>
                        </div>
                    </div>

                    <div class="detailed-list">
                        <div class="detail-row" id="base-detail-row">
                            <span class="detail-label">기본 대관료 산출</span>
                            <span id="res-base">0원</span>
                        </div>
                        <div class="detail-math" id="base-math">단가 0원 × 0시간 × 0회</div>
                        
                        <div class="detail-row" id="lighting-row">
                            <span class="detail-label">조명 사용료</span>
                            <span id="res-lighting">0원</span>
                        </div>
                        <div class="detail-math" id="light-math">단가 0원 × 0시간 × 0회</div>

                        <div class="detail-row" id="cooling-row">
                            <span class="detail-label">냉방 사용료</span>
                            <span id="res-cooling">0원</span>
                        </div>
                        <div class="detail-math" id="cooling-math">기본료 20% × 0시간 × 0회</div>

                        <div class="detail-row" id="heating-row">
                            <span class="detail-label">난방 사용료</span>
                            <span id="res-heating">0원</span>
                        </div>
                        <div class="detail-math" id="heating-math">기본료 20% × 0시간 × 0회</div>

                        <div class="divider"></div>
                        
                        <div class="detail-row subtotal">
                            <span>합계 (감면 전)</span>
                            <span id="res-subtotal">0원</span>
                        </div>
                        <div class="detail-row discount">
                            <span>감면 적용 (<span id="res-discount-label">0%</span>)</span>
                            <span id="res-discount">0원</span>
                        </div>
                    </div>

                    <div class="final-display">
                        <p>최종 예상 사용료</p>
                        <div class="price-tag">
                            <span class="won">₩</span>
                            <span id="res-total">0</span>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Modal remains similar -->
    <div id="settings-modal" class="modal">
        <div class="modal-content card">
            <div class="modal-header">
                <h2>단가 설정</h2>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>규모별 시간당 사용료 (원)</label>
                    <div class="rate-grid">
                        <div class="sub-input">
                            <label>500㎡ 미만</label>
                            <input type="number" id="set-rate-small" value="10000">
                        </div>
                        <div class="sub-input">
                            <label>500~1,000㎡</label>
                            <input type="number" id="set-rate-medium" value="15000">
                        </div>
                        <div class="sub-input">
                            <label>1,000㎡ 이상</label>
                            <input type="number" id="set-rate-large" value="20000">
                        </div>
                    </div>
                </div>
                <div class="input-group">
                    <label>조명 시간당 요금</label>
                    <input type="number" id="set-light-rate" value="5000">
                </div>
                <div class="input-group">
                    <label>냉난방 시간당 요금</label>
                    <input type="number" id="set-hvac-rate" value="5000">
                </div>
            </div>
            <div class="modal-footer">
                <button id="btn-save-settings" class="btn btn-primary">저장하기</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
